<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Spec Preview</title>
    <script>
      (() => {
        const stored = localStorage.getItem("spec-preview-theme");
        const system = window.matchMedia?.("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        document.documentElement.dataset.theme = stored || system;
      })();
    </script>
    <script>
      tailwind = {
        config: {
          theme: {
            extend: {
              fontFamily: {
                sans: ["Inter", "ui-sans-serif", "system-ui", "sans-serif"],
              },
              colors: {
                "base-100": "hsl(var(--b1) / <alpha-value>)",
                "base-200": "hsl(var(--b2) / <alpha-value>)",
                "base-300": "hsl(var(--b3) / <alpha-value>)",
                "base-content": "hsl(var(--bc) / <alpha-value>)",
                neutral: "hsl(var(--n) / <alpha-value>)",
                "neutral-content": "hsl(var(--nc) / <alpha-value>)",
                primary: "hsl(var(--p) / <alpha-value>)",
                error: "hsl(var(--er) / <alpha-value>)",
                success: "hsl(var(--su) / <alpha-value>)",
                warning: "hsl(var(--wa) / <alpha-value>)",
                info: "hsl(var(--in) / <alpha-value>)",
              },
            },
          },
        },
      };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body class="min-h-screen bg-base-200 text-base-content" data-ui-kit="treact">
    <div class="min-h-screen lg:pl-[22rem]">
      <aside class="border-base-300 bg-base-100 max-h-[46vh] overflow-auto border-b p-4 lg:fixed lg:left-0 lg:top-0 lg:h-screen lg:w-[22rem] lg:max-h-none lg:border-b-0 lg:border-r">
        <div class="mb-4 flex items-center gap-3">
          <div class="grid h-10 w-10 place-items-center rounded-lg bg-neutral text-neutral-content"><i data-lucide="book-open-text" class="h-5 w-5"></i></div>
          <div class="min-w-0">
            <div class="font-bold">Spec Preview</div>
            <div id="projectName" class="text-base-content/60 truncate text-sm">Loading</div>
          </div>
        </div>

        <label class="input input-bordered mb-3 flex h-10 items-center gap-2">
          <i data-lucide="search" class="text-base-content/50 h-4 w-4"></i>
          <input id="search" class="grow" placeholder="Spec name, path, status" />
        </label>

        <div class="mb-4 grid gap-2">
          <select id="categoryFilter" class="select select-bordered select-sm w-full"><option value="">All categories</option></select>
          <select id="statusFilter" class="select select-bordered select-sm w-full"><option value="">All statuses</option></select>
          <select id="complianceFilter" class="select select-bordered select-sm w-full"><option value="">All compliance</option></select>
        </div>

        <nav id="specList" class="space-y-1"></nav>
      </aside>

      <main class="min-w-0">
        <header class="bg-base-200/90 border-base-300 sticky top-0 z-10 flex flex-col gap-4 border-b px-5 py-4 backdrop-blur md:flex-row md:items-center md:justify-between">
          <div class="min-w-0">
            <h1 id="pageTitle" class="truncate text-2xl font-bold tracking-normal">Overview</h1>
            <p id="pagePath" class="text-base-content/60 truncate text-sm"></p>
          </div>
          <div class="flex flex-wrap items-center gap-2">
            <div role="tablist" class="tabs tabs-boxed w-fit">
              <button class="tab tab-active" data-tab="overview">Overview</button>
              <button class="tab" data-tab="spec">Spec</button>
              <button class="tab" data-tab="graph">Graph</button>
            </div>
            <button id="themeToggle" class="btn btn-ghost btn-sm" type="button" aria-label="Toggle dark mode" title="Toggle dark mode">
              <i data-lucide="moon" class="h-4 w-4"></i>
              <span id="themeLabel" class="hidden sm:inline">Dark</span>
            </button>
          </div>
        </header>

        <section id="overviewTab" class="panel active p-5">
          <div id="summaryCards" class="mb-4 grid grid-cols-2 gap-3 xl:grid-cols-5"></div>
          <div class="grid gap-4 xl:grid-cols-[minmax(0,1fr)_24rem]">
            <article class="card border-base-300 bg-base-100 border">
              <div class="card-body">
                <h2 class="card-title text-base">Sync State</h2>
                <dl id="syncState" class="grid grid-cols-[max-content_minmax(0,1fr)] gap-x-4 gap-y-2 text-sm"></dl>
              </div>
            </article>
            <article class="card border-base-300 bg-base-100 border">
              <div class="card-body">
                <h2 class="card-title text-base">Warnings</h2>
                <div id="warnings" class="grid gap-2"></div>
              </div>
            </article>
          </div>
        </section>

        <section id="specTab" class="panel p-5">
          <article id="specContent" class="markdown card border-base-300 bg-base-100 mx-auto max-w-5xl border p-6"></article>
        </section>

        <section id="graphTab" class="panel p-5">
          <div class="grid gap-4">
            <div class="card border-base-300 bg-base-100 border">
              <div class="card-body gap-3">
                <div class="flex flex-wrap items-center justify-between gap-3">
                  <h2 class="card-title text-base">Dependency Diagram</h2>
                  <div id="graphStats" class="text-base-content/60 text-sm"></div>
                </div>
                <div id="graphDiagram" class="graph-diagram min-h-72 overflow-auto rounded-lg border border-base-300 bg-base-100 p-4"></div>
              </div>
            </div>
            <div class="grid gap-4 xl:grid-cols-[minmax(0,1fr)_24rem]">
              <div class="card border-base-300 bg-base-100 border">
                <div class="card-body p-0">
                  <div id="graphCanvas" class="h-[70vh] min-h-[34rem] w-full"></div>
                </div>
              </div>
              <aside class="card border-base-300 bg-base-100 max-h-[70vh] border">
                <div class="card-body overflow-auto">
                  <h2 class="card-title text-base">Relationships</h2>
                  <div id="relationships" class="divide-base-300 divide-y"></div>
                  <h2 class="card-title mt-4 text-base">Forbidden Rules</h2>
                  <div id="constraints" class="grid gap-2"></div>
                </div>
              </aside>
            </div>
          </div>
        </section>
      </main>
    </div>

    <dialog id="diagramLightbox" class="diagram-lightbox">
      <div class="diagram-lightbox__panel">
        <header class="diagram-lightbox__header">
          <div class="min-w-0">
            <div id="diagramLightboxTitle" class="truncate text-sm font-semibold">Diagram</div>
            <div class="text-base-content/55 text-xs">Scroll to zoom, drag to pan</div>
          </div>
          <div class="flex shrink-0 items-center gap-1">
            <button id="diagramZoomOut" class="btn btn-ghost btn-sm" type="button" aria-label="Zoom out">
              <i data-lucide="zoom-out" class="h-4 w-4"></i>
            </button>
            <span id="diagramZoomLevel" class="text-base-content/60 w-14 text-center text-xs tabular-nums">100%</span>
            <button id="diagramZoomIn" class="btn btn-ghost btn-sm" type="button" aria-label="Zoom in">
              <i data-lucide="zoom-in" class="h-4 w-4"></i>
            </button>
            <button id="diagramZoomFit" class="btn btn-ghost btn-sm" type="button" aria-label="Fit diagram">
              <i data-lucide="scan" class="h-4 w-4"></i>
            </button>
            <button id="diagramZoomReset" class="btn btn-ghost btn-sm" type="button" aria-label="Reset zoom">
              <i data-lucide="rotate-ccw" class="h-4 w-4"></i>
            </button>
            <button id="diagramLightboxClose" class="btn btn-ghost btn-sm" type="button" aria-label="Close diagram">
              <i data-lucide="x" class="h-4 w-4"></i>
            </button>
          </div>
        </header>
        <div id="diagramLightboxContent" class="diagram-lightbox__content"></div>
      </div>
    </dialog>

    <script src="https://cdn.jsdelivr.net/npm/lucide@0.468.0/dist/umd/lucide.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/markdown-it@14.1.0/dist/markdown-it.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@11.12.0/dist/mermaid.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/cytoscape@3.30.2/dist/cytoscape.min.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
