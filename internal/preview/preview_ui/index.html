<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Docs Preview</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <script>
      (() => {
        const stored = localStorage.getItem("spec-preview-theme");
        const system = window.matchMedia?.("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        document.documentElement.dataset.theme = stored || system;
      })();
    </script>
    <script>
      tailwind = {
        config: {
          theme: {
            extend: {
              fontFamily: {
                sans: ["Inter", "ui-sans-serif", "system-ui", "sans-serif"],
              },
            },
          },
        },
      };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/daisyui@4.12.24/dist/full.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.11.1/styles/github-dark.min.css" />
    <link rel="stylesheet" href="/style.css" />
    <script type="importmap">
      {
        "imports": {
          "graphology": "https://cdn.jsdelivr.net/npm/graphology@0.26.0/+esm",
          "graphology-layout-forceatlas2": "https://cdn.jsdelivr.net/npm/graphology-layout-forceatlas2@0.10.1/+esm",
          "sigma": "https://cdn.jsdelivr.net/npm/sigma@3.0.3/+esm"
        }
      }
    </script>
  </head>
  <body class="min-h-screen bg-base-200 text-base-content">
    <div class="min-h-screen lg:pl-[22rem]">
      <aside
        class="border-base-300 bg-base-100 max-h-[46vh] overflow-auto border-b p-4 lg:fixed lg:left-0 lg:top-0 lg:h-screen lg:w-[22rem] lg:max-h-none lg:border-b-0 lg:border-r"
      >
        <div class="mb-4 flex items-center gap-3">
          <div class="grid h-10 w-10 place-items-center rounded-lg bg-neutral text-neutral-content">
            <i data-lucide="book-open-text" class="h-5 w-5"></i>
          </div>
          <div class="min-w-0">
            <div class="font-bold">Docs Preview</div>
            <div id="projectName" class="text-base-content/60 truncate text-sm">Loading</div>
          </div>
        </div>

        <label class="input input-bordered mb-3 flex h-10 items-center gap-2">
          <i data-lucide="search" class="text-base-content/50 h-4 w-4"></i>
          <input id="search" class="grow" placeholder="Doc name, path, status" />
        </label>

        <nav id="specList" class="space-y-1"></nav>
      </aside>

      <main class="min-w-0">
        <header
          class="bg-base-200/90 border-base-300 sticky top-0 z-10 flex flex-col gap-4 border-b px-5 py-4 backdrop-blur md:flex-row md:items-center md:justify-between"
        >
          <div class="min-w-0">
            <h1 id="pageTitle" class="truncate text-2xl font-bold tracking-normal">Doc</h1>
            <p id="pagePath" class="text-base-content/60 truncate text-sm"></p>
          </div>
          <div class="flex flex-wrap items-center gap-2">
            <div role="tablist" class="tabs tabs-boxed w-fit" aria-label="Preview sections">
              <button class="tab" data-tab="graph" type="button" aria-label="Graph" title="Graph">
                <i data-lucide="git-fork" class="h-4 w-4"></i>
              </button>
              <button class="tab" data-tab="search" type="button" aria-label="Search" title="Search">
                <i data-lucide="search" class="h-4 w-4"></i>
              </button>
              <button id="themeToggle" class="tab" type="button" aria-label="Toggle dark mode" title="Toggle dark mode">
                <i data-lucide="moon" class="h-4 w-4"></i>
              </button>
            </div>
          </div>
        </header>

        <section id="graphTab" class="panel p-5">
          <div class="graph-shell border-base-300 bg-base-100 border">
            <div class="graph-toolbar border-base-300 border-b">
              <div class="min-w-0">
                <h2 class="text-base font-semibold">Docs Graph</h2>
                <p id="graphStats" class="text-base-content/60 text-sm">Loading graph</p>
              </div>
              <div class="flex flex-wrap items-center gap-2">
                <label class="input input-bordered input-sm flex items-center gap-2">
                  <i data-lucide="search" class="text-base-content/50 h-4 w-4"></i>
                  <input id="graphSearch" class="w-40 sm:w-56" placeholder="Find node" />
                </label>
                <button id="graphFit" class="btn btn-ghost btn-sm" type="button" aria-label="Fit graph" title="Fit graph">
                  <i data-lucide="scan" class="h-4 w-4"></i>
                </button>
              </div>
            </div>
            <div class="graph-layout">
              <div id="graphCanvas" class="graph-canvas" role="img" aria-label="Spec document graph"></div>
              <aside id="graphDetails" class="graph-details border-base-300 border-t"></aside>
            </div>
          </div>
        </section>

        <section id="searchTab" class="panel p-5">
          <div class="search-shell border-base-300 bg-base-100 border">
            <div class="search-toolbar border-base-300 border-b">
              <label class="input input-bordered flex min-h-11 flex-1 items-center gap-2">
                <i data-lucide="search" class="text-base-content/50 h-4 w-4"></i>
                <input id="globalSearch" class="grow" placeholder="Search docs, code, graph nodes; separate keywords with commas" />
              </label>
              <select
                id="searchKeywordOperator"
                class="select select-bordered min-h-11"
                aria-label="Keyword result operator"
                title="Keyword result operator"
              >
                <option value="sum">Sum keywords</option>
                <option value="difference">Difference keywords</option>
              </select>
            </div>
            <div id="searchSummary" class="search-summary border-base-300 border-b"></div>
            <div class="search-grid">
              <section class="search-panel" data-search-panel="docsSemantic">
                <div class="search-panel-heading">
                  <h2>Docs Semantic</h2>
                  <span id="docsSemanticCount" class="badge badge-ghost badge-sm">0</span>
                </div>
                <div id="docsSemanticResults" class="search-results"></div>
              </section>
              <section class="search-panel" data-search-panel="docsGraph">
                <div class="search-panel-heading">
                  <h2>Docs Graph</h2>
                  <span id="docsGraphCount" class="badge badge-ghost badge-sm">0</span>
                </div>
                <div id="docsGraphResults" class="search-results"></div>
              </section>
              <section class="search-panel" data-search-panel="codeSemantic">
                <div class="search-panel-heading">
                  <h2>Code Semantic</h2>
                  <span id="codeSemanticCount" class="badge badge-ghost badge-sm">0</span>
                </div>
                <div id="codeSemanticResults" class="search-results"></div>
              </section>
              <section class="search-panel" data-search-panel="codeGraph">
                <div class="search-panel-heading">
                  <h2>Code Graph</h2>
                  <div class="flex items-center gap-2">
                    <button
                      id="codeGraphReload"
                      class="btn btn-ghost btn-xs"
                      type="button"
                      title="Reload code graph"
                      aria-label="Reload code graph"
                    >
                      <i data-lucide="refresh-cw" class="h-3.5 w-3.5"></i>
                    </button>
                    <span id="codeGraphCount" class="badge badge-ghost badge-sm">0</span>
                  </div>
                </div>
                <div id="codeGraphResults" class="search-results"></div>
              </section>
            </div>
          </div>
        </section>

        <section id="specTab" class="panel active p-5">
          <div class="mx-auto mb-3 flex max-w-5xl justify-end">
            <button
              id="rawMarkdownToggle"
              class="btn btn-ghost btn-sm"
              type="button"
              aria-label="View raw Markdown"
              title="View raw Markdown"
              hidden
            >
              <i data-lucide="file-code" class="h-4 w-4"></i>
            </button>
          </div>
          <article id="specContent" class="markdown card border-base-300 bg-base-100 mx-auto max-w-5xl border p-6"></article>
        </section>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/lucide@0.468.0/dist/umd/lucide.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/markdown-it@14.1.0/dist/markdown-it.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.11.1/build/highlight.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.11.1/build/languages/go.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.11.1/build/languages/typescript.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10.9.3/dist/mermaid.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/svg-pan-zoom@3.6.2/dist/svg-pan-zoom.min.js"></script>
    <div id="previewDialog" class="modal" role="dialog" aria-modal="true" aria-labelledby="previewDialogTitle">
      <div class="modal-box preview-modal border-base-300 bg-base-100 border p-0">
        <div class="preview-modal-header border-base-300 border-b">
          <div class="min-w-0">
            <h2 id="previewDialogTitle" class="truncate text-base font-semibold">Preview</h2>
            <p id="previewDialogPath" class="text-base-content/60 truncate text-xs"></p>
          </div>
          <div class="flex items-center gap-1">
            <button
              id="previewRawToggle"
              class="btn btn-ghost btn-sm"
              type="button"
              aria-label="View raw source"
              title="View raw source"
              hidden
            >
              <i data-lucide="file-code" class="h-4 w-4"></i>
            </button>
            <button class="btn btn-ghost btn-sm" type="button" data-close-preview aria-label="Close preview" title="Close preview">
              <i data-lucide="x" class="h-4 w-4"></i>
            </button>
          </div>
        </div>
        <div id="previewDialogBody" class="preview-modal-body"></div>
      </div>
      <button class="modal-backdrop" type="button" data-close-preview>close</button>
    </div>
    <div id="selectionContextMenu" class="selection-context-menu" hidden>
      <button id="selectionCopyButton" class="btn btn-primary btn-xs" type="button">
        <i data-lucide="copy" class="h-3.5 w-3.5"></i>
        <span>Copy filepath and line index</span>
      </button>
    </div>
    <script type="module" src="/app.js"></script>
  </body>
</html>
