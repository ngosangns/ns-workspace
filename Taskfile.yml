# Generated by ns-workspace setup. Re-run 'go run github.com/ngosangns/ns-workspace@latest setup' to refresh.
# Custom tasks should use names that don't collide with the reserved prefixes
# (ns:, lint:, go:) to survive regeneration.
#
# Run 'task --list' to see all available tasks.
tasks:
    go:build:
        cmds:
            - go build ./...
        desc: Build toàn bộ Go packages trong repo
    go:test:
        cmds:
            - go test ./...
        desc: Chạy Go test cho toàn bộ packages
    lint:doc:
        cmds:
            - npm run lint:doc
        desc: Lint markdown + html toàn bộ docs (README, docs, presets)
    lint:doc:fix:
        cmds:
            - npm run lint:doc:fix
        desc: Auto-fix markdown + html toàn bộ docs
    lint:portal:
        cmds:
            - npm run lint:portal
        desc: Lint TypeScript + Vue trong portal UI
    lint:portal:fix:
        cmds:
            - npm run lint:portal:fix
        desc: Auto-fix TypeScript + Vue lint issues
    lint:preview:
        cmds:
            - npm run lint:preview
        desc: Lint markdown + html trong docs/ (nội dung preview)
    lint:preview:fix:
        cmds:
            - npm run lint:preview:fix
        desc: Auto-fix markdown + html trong docs/ preview
    ns:doctor:
        cmds:
            - go run github.com/ngosangns/ns-workspace@latest doctor
        desc: Validate JSON config và report local agent CLI
    ns:export:
        cmds:
            - go run github.com/ngosangns/ns-workspace@latest export --project . --out ./kb.html --open
        desc: Export docs + graph thành file HTML tĩnh self-contained
    ns:graph:
        cmds:
            - go run github.com/ngosangns/ns-workspace@latest graph --project .
        desc: Chạy query Search/Code Graph terminal (mặc định không truyền --query; dùng `task ns:graph -- <args>` để truyền flag)
    ns:harness:list:
        cmds:
            - go run github.com/ngosangns/ns-workspace@latest harness list
        desc: Liệt kê harness task có sẵn trong .harness/tasks/
    ns:harness:run:
        cmds:
            - go run github.com/ngosangns/ns-workspace@latest harness run --project .
        desc: Chạy harness task theo --task ID (mặc định không truyền --task; dùng `task ns:harness:run -- --task <id>`)
    ns:init:
        cmds:
            - go run github.com/ngosangns/ns-workspace@latest init
        desc: Cài cấu hình shared và link/copy sang adapter native
    ns:kb:index:
        cmds:
            - go run github.com/ngosangns/ns-workspace@latest kb index --project .
        desc: Sinh lại index.md progressive-disclosure cho từng thư mục docs
    ns:kb:validate:
        cmds:
            - go run github.com/ngosangns/ns-workspace@latest kb validate --project .
        desc: Kiểm tra OKF conformance của docs (frontmatter + type)
    ns:lsp:install:
        cmds:
            - go run github.com/ngosangns/ns-workspace@latest lsp install
        desc: 'Cài language server (vd: task ns:lsp:install -- auto, task ns:lsp:install -- kotlin)'
    ns:lsp:list:
        cmds:
            - go run github.com/ngosangns/ns-workspace@latest lsp list
        desc: Liệt kê language server đã cài và trạng thái cho từng ngôn ngữ
    ns:mcp:
        cmds:
            - go run github.com/ngosangns/ns-workspace@latest mcp --project . {{.CLI_ARGS}}
        desc: 'Chạy MCP command trên docs/ hiện tại (vd: task ns:mcp -- list-docs --type module)'
    ns:portal:
        cmds:
            - go run github.com/ngosangns/ns-workspace@latest portal --open
        desc: Chạy portal server quản lý preset/skills/MCP/registry
    ns:preview:
        cmds:
            - go run github.com/ngosangns/ns-workspace@latest preview --project . --open
        desc: Chạy Quartz dev server cho docs/ của project hiện tại
    ns:search:
        cmds:
            - go run github.com/ngosangns/ns-workspace@latest search --project .
        desc: Mở Search/Code Graph standalone cho docs/ của project hiện tại
    ns:status:
        cmds:
            - go run github.com/ngosangns/ns-workspace@latest status
        desc: Hiển thị trạng thái cài đặt agents của ns-workspace
    ns:update:
        cmds:
            - go run github.com/ngosangns/ns-workspace@latest update
        desc: Rewrite các phần config do tool quản lý từ preset embedded
version: "3"
