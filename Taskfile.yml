# Generated by ns-workspace setup. Re-run 'go run . setup' to refresh.
# Custom tasks should use names that don't collide with the reserved prefixes
# (ns:, lint:, format:, build:, go:) to survive regeneration.
#
# Run 'task --list' to see all available tasks.
tasks:
    build:portal:
        cmds:
            - npm run build:portal
        desc: Build UI portal với Vite
    build:preview:
        cmds:
            - npm run build:preview
        desc: Build UI preview với Vite
    go:build:
        cmds:
            - go build ./...
        desc: Build toàn bộ Go packages trong repo
    go:test:
        cmds:
            - go test ./...
        desc: Chạy Go test cho toàn bộ packages
    lint:docs:
        cmds:
            - npm run lint:docs
        desc: Lint + auto-fix markdown + html trong docs và presets
    lint:docs:check:
        cmds:
            - npm run lint:docs:check
        desc: Check markdown + html (không ghi file)
    lint:portal:
        cmds:
            - npm run lint:portal
        desc: Lint + auto-fix TypeScript + Vue trong portal UI
    lint:portal:check:
        cmds:
            - npm run lint:portal:check
        desc: Check TypeScript + Vue trong portal UI (không ghi file)
    lint:preview:
        cmds:
            - npm run lint:preview
        desc: Lint + auto-fix TypeScript + Vue trong preview UI
    lint:preview:check:
        cmds:
            - npm run lint:preview:check
        desc: Check TypeScript + Vue trong preview UI (không ghi file)
    ns:doctor:
        cmds:
            - go run . doctor
        desc: Validate JSON config và report local agent CLI
    ns:export:
        cmds:
            - go run . export --project . --out ./kb.html --open
        desc: Export docs + graph thành file HTML tĩnh self-contained
    ns:graph:
        cmds:
            - go run . graph --project .
        desc: Chạy query Search/Code Graph terminal (mặc định không truyền --query; dùng `task ns:graph -- <args>` để truyền flag)
    ns:harness:list:
        cmds:
            - go run . harness list
        desc: Liệt kê harness task có sẵn trong .harness/tasks/
    ns:harness:run:
        cmds:
            - go run . harness run --project .
        desc: Chạy harness task theo --task ID (mặc định không truyền --task; dùng `task ns:harness:run -- --task <id>`)
    lint:kb:
        cmds:
            - go run . kb validate --project .
        desc: Kiểm tra OKF conformance của docs (frontmatter + type)
    ns:lsp:install:
        cmds:
            - go run . lsp install
        desc: 'Cài language server (vd: task ns:lsp:install -- auto, task ns:lsp:install -- kotlin)'
    ns:lsp:list:
        cmds:
            - go run . lsp list
        desc: Liệt kê language server đã cài và trạng thái cho từng ngôn ngữ
    ns:mcp:
        cmds:
            - go run . mcp --project .
        desc: Khởi động MCP server stdio local expose docs/ cho agent (list/lookup/search/modify)
    ns:portal:
        cmds:
            - go run . portal --open
        desc: Chạy portal web UI quản lý skills, MCPs và sync (tích hợp docs preview)
    ns:search:
        cmds:
            - go run . search --project .
        desc: Mở Search/Code Graph standalone cho docs/ của project hiện tại
    ns:status:
        cmds:
            - go run . status
        desc: Hiển thị trạng thái cài đặt agents của ns-workspace
    ns:sync:
        cmds:
            - go run . init
            - go run . update
            - go run . kb index --project .
        desc: Chạy init + update cấu hình shared, rồi regenerate docs index
version: "3"
